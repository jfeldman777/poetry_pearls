   <script language=javascript>
	d1=new Date(1999,1,5);//Feb 5
	d2=new Date();
	dd=(d2-d1)/86400000;//days between
	dd=Math.floor(dd);

   function fname()
   {
	return 'son'+dd+'.htm'
   }
	function gotoMe()
	{
		document.location.href=fname()
	}
	function box()
	{
		window.open(fname())
	}
   </script>
